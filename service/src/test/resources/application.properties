# Spring Boot-innstillinger for integrasjonstest mot database.
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# NB. Sett disse som system properties or miljřvariable. Alternativt redigere 
# denne fila, men da mĺ du passe pĺ ĺ ikke sjekke inn i versjonskontroll.
spring.datasource.url=${melosys.spring.datasource.url}
spring.datasource.username=${melosys.spring.datasource.username}
spring.datasource.password=${melosys.spring.datasource.password}

# Hibernate dialect
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect

# Validerer hibernate mapping
spring.jpa.hibernate.ddl-auto=validate

