apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: {{APP_NAME}}
  namespace: teammelosys
  labels:
    team: teammelosys
spec:
  image: {{ IMAGE }}
  port: 8080
  replicas:
    min: 2
    max: 2
    cpuThresholdPercentage: 80
  liveness:
    path: internal/health
    initialDelay: 40
    timeout: 10
    failureThreshold: 5
  readiness:
    path: internal/health
    initialDelay: 40
    timeout: 10
  resources:
    limits:
      cpu: 1000m
      memory: 2048Mi
    requests:
      cpu: 200m
      memory: 1024Mi
  vault:
    enabled: true
    paths:
      - mountPath: /var/run/secrets/nais.io/serviceuser
        kvPath: /serviceuser/data/{{VAULT_CLUSTER}}/srvmelosys
  prometheus:
    enabled: true
    path: /internal/prometheus
  ingresses:
  - "https://{{ URL }}"
  env:
  - name: SPRING_PROFILES_ACTIVE
    value: nais
  kafka:
    pool: {{ KAFKA_POOL }}
