name: melosys
image: docker.adeo.no:5000/melosys
team: teammelosys
replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 80
port: 8080
healthcheck:
    liveness:
      initialDelay: 240
      path: internal/health
    readiness:
      initialDelay: 120
      path: internal/health
prometheus:
    enabled: true
    path: internal/prometheus
resources:
  requests:
    cpu: 100m
    memory: 768Mi
  limits:
    cpu: 1000m
    memory: 1536Mi
fasitResources:
  used:
  - alias: ldap
    resourceType: ldap
  - alias: srvmelosys
    resourceType: credential
  - alias: melosysDB
    resourceType: datasource
  - alias: melosys:regelmodul
    resourceType: webserviceendpoint
  - alias: kodeverk.rest-api
    resourceType: restservice
  - alias: oppgave.oppgaver
    resourceType: restservice
  - alias: sak.saker
    resourceType: restservice
  - alias: Aktoer_v2
    resourceType: webserviceendpoint
  - alias: BehandleInngaaendeJournal_v1
    resourceType: webserviceendpoint
  - alias: Dokumentproduksjon_v3
    resourceType: webserviceendpoint
  - alias: InngaaendeJournal_v1
    resourceType: webserviceendpoint
  - alias: Journal_v3
    resourceType: webserviceendpoint
  - alias: melosys_channel
    resourceType: channel
  - alias: mqgateway02
    resourceType: queuemanager
  - alias: sbeh_saksbehandling
    resourceType: queue
  - alias: virksomhet:Arbeidsforhold_v3
    resourceType: webserviceendpoint
  - alias: virksomhet:Inntekt_v3
    resourceType: webserviceendpoint
  - alias: virksomhet:Medlemskap_v2
    resourceType: webserviceendpoint
  - alias: virksomhet:BehandleMedlemskap_v2
    resourceType: webserviceendpoint
  - alias: virksomhet:Organisasjon_v4
    resourceType: webserviceendpoint
  - alias: virksomhet:Person_v3
    resourceType: webserviceendpoint
  - alias: SakOgBehandling
    resourceType: webserviceendpoint
  - alias: securityTokenService
    resourceType: baseurl
  - alias: security-token-service-token
    resourceType: restservice
  - alias: OpenIdConnectAgent
    resourceType: credential
  - alias: OpenIdConnect
    resourceType: baseurl
  - alias: abac.pdp.endpoint
    resourceType: restservice
  - alias: melosys-eessi-apikey
    resourceType: credential
  - alias: kafka-brokers
    resourceType: baseurl
  - alias: kafka-schema-registry
    resourceType: baseurl