name: melosys
image: docker.adeo.no:5000/melosys
replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 80
port: 8080
healthcheck:
    liveness:
      initialDelay: 240
      path: internal/health
    readiness:
      initialDelay: 120
      path: internal/health
prometheus:
    enabled: true
    path: internal/prometheus
resources:
  requests:
    cpu: 100m
    memory: 768Mi
  limits:
    cpu: 1000m
    memory: 1536Mi
fasitResources:
  used:
  - alias: ldap
    resourceType: ldap
  - alias: srvmelosys
    resourceType: credential
  - alias: melosysDB
    resourceType: datasource
  - alias: melosys:regelmodul
    resourceType: webserviceendpoint
  - alias: Aktoer_v2
    resourceType: webserviceendpoint
  - alias: BehandleInngaaendeJournal_v1
    resourceType: webserviceendpoint
  - alias: Dokumentproduksjon_v3
    resourceType: webserviceendpoint
  - alias: InngaaendeJournal_v1
    resourceType: webserviceendpoint
  - alias: Journal_v3
    resourceType: webserviceendpoint
  - alias: virksomhet:Arbeidsforhold_v3
    resourceType: webserviceendpoint
  - alias: virksomhet:BehandleOppgave_v1
    resourceType: webserviceendpoint
  - alias: virksomhet:Inntekt_v3
    resourceType: webserviceendpoint
  - alias: virksomhet:Kodeverk_v2
    resourceType: webserviceendpoint
  - alias: virksomhet:Medlemskap_v2
    resourceType: webserviceendpoint
  - alias: virksomhet:Oppgave_v3
    resourceType: webserviceendpoint
  - alias: virksomhet:Organisasjon_v4
    resourceType: webserviceendpoint
  - alias: virksomhet:Person_v3
    resourceType: webserviceendpoint
# TODO sak.saker eksisterer ikke i T5
#  - alias: sak.saker
#    resourceType: restservice
  - alias: securityTokenService
    resourceType: baseurl
  - alias: OpenIdConnectAgent
    resourceType: credential
  - alias: OpenIdConnect
    resourceType: baseurl
