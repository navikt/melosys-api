# Server
server.forward-headers-strategy=native
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=25s

# Actuator og metrikker
management.endpoints.web.base-path=/internal
management.endpoints.web.exposure.include=health,loggers,prometheus
management.health.diskspace.enabled=false
management.metrics.web.server.request.autotime.enabled=true
management.metrics.enable[process.start.time]=false
management.metrics.enable[jvm.threads.peak]=false
management.metrics.enable[jvm.threads.daemon]=false
management.metrics.enable[jvm.classes.loaded]=false
management.metrics.enable[jvm.classes.unloaded]=false

# Caching
spring.cache.type=caffeine
spring.cache.cache-names=aktoerID,folkeregisterIdent
spring.cache.caffeine.spec.maximumSize=2048
spring.cache.caffeine.spec.expireAfterWrite=480m

# For å kunne hente ned større binærfiler fra SAF
spring.codec.max-in-memory-size=25MB

# Datasource
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${melosysDB.url}
spring.datasource.username=${melosysDB.username}
spring.datasource.password=${melosysDB.password}
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.org.hibernate.envers.audit_strategy=org.hibernate.envers.strategy.DefaultAuditStrategy
spring.jpa.properties.org.hibernate.envers.audit_strategy_validity_store_revend_timestamp=true
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

# Task execution
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=4

# Jackson
spring.jackson.default-property-inclusion=ALWAYS
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Kafka
kafka.aiven.brokers= ${KAFKA_BROKERS:localhost:29092}
kafka.aiven.keystorePath= ${KAFKA_KEYSTORE_PATH:/dev/zero}
kafka.aiven.truststorePath= ${KAFKA_TRUSTSTORE_PATH:/dev/zero}
kafka.aiven.credstorePassword= ${KAFKA_CREDSTORE_PASSWORD:pwd}

# ABAC
no.nav.abac.systemuser.username=${systemuser.username}
no.nav.abac.systemuser.password=${systemuser.password}

# spring boot bump 3.2.2
#spring.mvc.pathmatch.matching-strategy: ant_path_matcher
spring.jpa.properties.hibernate.id.db_structure_naming_strategy: legacy
