# Server
server.use-forward-headers=true

# Bruk local i stedet for nais for å kjøre lokalt
spring.profiles.active=nais

# Actuator og metrikker
management.endpoints.web.base-path=/internal
management.health.diskspace.enabled=false
management.metrics.enable[process.start.time]=false
management.metrics.enable[jvm.threads.peak]=false
management.metrics.enable[jvm.threads.daemon]=false
management.metrics.enable[jvm.classes.loaded]=false
management.metrics.enable[jvm.classes.unloaded]=false

# Datasource
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${melosysDB.url}
spring.datasource.username=${melosysDB.username}
spring.datasource.password=${melosysDB.password}

# Task execution
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=4

# Hikari connection pool
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# Hibernate dialect
spring.jpa.database-platform=no.nav.melosys.Oracle12cXmlClobDialect

# Jackson
spring.jackson.default-property-inclusion=ALWAYS
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Kafka
spring.kafka.bootstrap-servers=${kafka.brokers}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${systemuser.username}" password="${systemuser.password}";
spring.kafka.properties.reconnect.backoff.ms=1000
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.security.protocol=SASL_SSL

# ABAC
no.nav.abac.systemuser.username=${systemuser.username}
no.nav.abac.systemuser.password=${systemuser.password}
