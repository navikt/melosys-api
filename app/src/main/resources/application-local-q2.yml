spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@10.53.103.77/MELOSYS_Q2
    username: MELOSYS_Q2
    password: ${melosysDB.password}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: validate

systemuser:
  username: srvmelosys
  password: ${systemuser.password}

kubernetes:
  azure:
    kubelogin:
      path: ${KUBELOGIN_PATH:/home/linuxbrew/.linuxbrew/bin}
    kubectl:
      path: ${KUBECTL_PATH:/usr/local/bin}

# Token-validering
no:
