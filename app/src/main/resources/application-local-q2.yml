# Apikey til ProsessinstansAdminTjenste
Melosys-admin:
  apikey: dummy

# Kafka
kafka:
  aiven:
    eessi:
      groupId: teammelosys-eessiMelding-consumer
      topic: teammelosys.eessi.v1-q2:teammelosys.eessi.v1
    soknad-mottak:
      topic: teammelosys.soknad-mottak.v1-q2:teammelosys.soknad-mottak.v1
      groupid: teammelosys-soknad-mottak-consumer
    a1-utstedt:
      topic: teammelosys.melosys-utstedt-a1.v1-q2:teammelosys.melosys-utstedt-a1.v1
    manglende-fakturabetaling:
      topic: teammelosys.manglende-fakturabetaling.v1-q2
      groupid: teammelosys.manglende-fakturabetaling-consumer
    melosys-hendelser:
      topic: teammelosys.melosys-hendelser.v1-q2
    skattehendelser:
      groupid: teammelosys.skattehendelser-consumer

spring:
  kafka:
    properties:
      sasl:
        jaas:
          config: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="${systemuser.username}" password="${systemuser.password}";'
        mechanism: PLAIN
      reconnect:
        backoff:
          ms: 1000
      security:
        protocol: SASL_SSL

# Unleash
unleash:
  token: faketoken

# Disable lDAP health check for Actuator
management:
  health:
    ldap:
      enabled: false

# Client scopes for Entra (Azure AD)
AZURE_OPENID_CONFIG_TOKEN_ENDPOINT: https://login.microsoftonline.com/966ac572-f5b7-4bbe-aa88-c76419c0f851/oauth2/v2.0/token

NAIS_CLUSTER_NAME: dev-fss
NAIS_CLUSTER_NAME_GCP: dev-gcp

APP_NAME_PDL: pdl-api
APP_NAME_OPPGAVE: oppgave
APP_NAME_SAF: saf
APP_NAME_MEDL: medlemskap-medl-api
APP_NAME_MELOSYS_EESSI: melosys-eessi
APP_NAME_ARBEIDSFORHOLD: aareg-services-nais
APP_NAME_INNTEKTSKOMPONENTEN: inntektskomponenten
APP_NAME_UTBETALING: sokos-utbetaldata
APP_NAME_FAKTURERINGSKOMPONENTEN: faktureringskomponenten-q2
APP_NAME_FELLESKODEVERK: kodeverk-api

# Logging av RestTemplate
logging:
  level:
    org.springframework.web.client.RestTemplate: INFO 