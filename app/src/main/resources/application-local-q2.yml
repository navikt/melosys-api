spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@10.53.103.77/MELOSYS_Q2
    username: MELOSYS_Q2
    password: ${melosysDB.password}
  flyway:
    enabled: false
  # Validerer Hibernate mapping
  jpa:
    hibernate:
      ddl-auto: validate

# Systembruker konfigurasjon
systemuser:
  username: srvmelosys
  password: ${systemuser.password}

# Kubernetes Azure konfigurasjon
kubernetes:
  azure:
    kubelogin:
      path: ${KUBELOGIN_PATH:/home/linuxbrew/.linuxbrew/bin}
    kubectl:
      path: ${KUBECTL_PATH:/usr/local/bin}

# Token-validering
no:
  nav:
    security:
      jwt:
        issuer:
          aad:
            discoveryurl: https://login.microsoftonline.com/966ac572-f5b7-4bbe-aa88-c76419c0f851/v2.0/.well-known/openid-configuration
            accepted-audience: ${AZURE_APP_CLIENT_ID}
    # ABAC
    abac:
      url: https://abac-melosys-q2.dev.intern.nav.no/application/asm-pdp/authorize

# Soap-klient policy
stsPolicy:
  url: classpath:stsPolicy.xml

