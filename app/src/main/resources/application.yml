server:
  forward-headers-strategy: native
  shutdown: graceful
spring:
  cache:
    cache-names: aktoerID,folkeregisterIdent,kodeverk,tilgangsmaskinen
    caffeine:
      spec:
        expireAfterWrite: 480m
        maximumSize: 2048
        tilgangsmaskinen: maximumSize=1024,expireAfterWrite=60m
    type: caffeine
  codec:
    max-in-memory-size: 50MB
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
    password: ${melosysDB.password}
    url: ${melosysDB.url}
    username: ${melosysDB.username}
  jackson:
    default-property-inclusion: ALWAYS
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    properties:
      hibernate:
        connection:
          autocommit: false
        id:
          db_structure_naming_strategy: legacy
        format_sql: true
        show_sql: false
      org:
        hibernate:
          envers:
            audit_strategy: org.hibernate.envers.strategy.DefaultAuditStrategy
            audit_strategy_validity_store_revend_timestamp: true
            store_data_at_delete: true
  lifecycle:
    timeout-per-shutdown-phase: 25s
  task:
    execution:
      pool:
        core-size: 1
        max-size: 4
springdoc:
  api-docs:
    path: /api-docs
  group-configs:
    - display-name: Melosys Admin API
      group: admin
      paths-to-match: /admin/**,/api/admin/**
  swagger-ui:
    path: /swagger-ui.html

melosys:
  service:
    fagsak:
      arbeidsforholdhistorikk:
        # Hvor mange måneder tilbake i tid vi henter arbeidsforhold for
        antallMåneder: 6
      inntektshistorikk:
        # Hvor mange måneder tilbake i tid vi henter inntekt for
        antallMåneder: 6
      medlemskaphistorikk:
        # Hvor mange År tilbake i tid vi henter medlemskap for
        antallÅr: 5
