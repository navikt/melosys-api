kafka:
  aiven:
    brokers: ${KAFKA_BROKERS:localhost:29092}
    credstorePassword: ${KAFKA_CREDSTORE_PASSWORD:pwd}
    keystorePath: ${KAFKA_KEYSTORE_PATH:/dev/zero}
    truststorePath: ${KAFKA_TRUSTSTORE_PATH:/dev/zero}
management:
  endpoints:
    web:
      base-path: /internal
      exposure:
        include: health,loggers,prometheus
  health:
    diskspace:
      enabled: false
  metrics:
    enable[jvm:
      classes:
        loaded]: false
        unloaded]: false
      threads:
        daemon]: false
        peak]: false
    enable[process:
      start:
        time]: false
'no':
  nav:
    security:
      jwt:
        client:
          registration:
            aareg:
              authentication:
                client-auth-method: client_secret_basic
                client-id: ${AZURE_APP_CLIENT_ID}
                client-secret: ${AZURE_APP_CLIENT_SECRET}
              grant-type: urn:ietf:params:oauth:grant-type:jwt-bearer
