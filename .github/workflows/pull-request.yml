name: Maven Test

on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
      packages: read
      pull-requests: write
      checks: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PASSWORD: ${{ secrets.READER_TOKEN }}
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.READER_TOKEN }}
      - name: Build and test
        run: mvn clean verify --threads=8 -B -e -U --settings .github/settings.xml

      - name: Saksflyt Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: Saksflyt Tests
          path: '**/saksflyt/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'failed'
          list-tests: 'failed'
          only-summary: 'true'
          fail-on-error: 'false'

      - name: Frontend-api Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: Frontend-api Tests
          path: '**/frontend-api/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'failed'
          list-tests: 'failed'
          only-summary: 'true'
          fail-on-error: 'false'

      - name: Service Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: Service Tests
          path: '**/service/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'failed'
          list-tests: 'failed'
          only-summary: 'true'
          fail-on-error: 'false'

      - name: API-Integrasjon Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: API-Integrasjon Tests
          path: '**/integrasjon/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'failed'
          list-tests: 'failed'
          only-summary: 'true'
          fail-on-error: 'false'

      - name: Domain Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: Domain Tests
          path: '**/domain/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'failed'
          list-tests: 'failed'
          only-summary: 'true'
          fail-on-error: 'false'

      - name: Config Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: Config Tests
          path: '**/config/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'failed'
          list-tests: 'failed'
          only-summary: 'true'
          fail-on-error: 'false'

      - name: Sikkerhet Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: Sikkerhet Tests
          path: '**/sikkerhet/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'failed'
          list-tests: 'failed'
          only-summary: 'true'
          fail-on-error: 'false'

      - name: Integration Test Report
        uses: dorny/test-reporter@v1.7.0
        if: success() || failure()
        with:
          name: Integration Tests
          path: '**/target/failsafe-reports/TEST-*.xml'
          reporter: java-junit
          list-suites: 'all'
          list-tests: 'failed'
          fail-on-error: 'false'
