name: Maven Test

on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: write
      packages: read
      pull-requests: write
      checks: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PASSWORD: ${{ secrets.READER_TOKEN }}
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.READER_TOKEN }}
      - name: Build and test
        run: mvn clean verify --threads=8 -B -e -U --settings .github/settings.xml

      - name: Test Report
        uses: dorny/test-reporter@v1.6.0
        if: success() || failure()
        with:
          name: Java Tests
          path: |
            '**/target/surefire-reports/TEST-*.xml'
            '**/target/surefire-reports/IT-*.xml'
          reporter: java-junit
          fail-on-error: 'false'

