on: pull_request

jobs:
  build:
    runs-on: [self-hosted, java-16]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build
        run: |
          JAVA_HOME=/usr/local/openjdk-16
          mvn clean package -B -e -U
