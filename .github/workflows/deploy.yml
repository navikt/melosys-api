on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Miljø'
        required: true
        default: 'q2'

env:
  IMAGE: docker.pkg.github.com/${{ github.repository }}/melosys-api:${{ github.sha }}
  IMAGE_MANIFEST: https://docker.pkg.github.com/v2/${{ github.repository }}/melosys-api/manifests/${{ github.sha }}

jobs:
  check_docker_image_exists:
    name: Check if docker image exists in registry
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "DOCKER_IMAGE_EXISTS_HTTP_STATUS=$(curl -X GET -s -o /dev/null -w "%{http_code}" ${{ env.IMAGE_MANIFEST }} -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }})" >> $GITHUB_ENV
      - id: set_output
        run: |
          if [ ${{ env.DOCKER_IMAGE_EXISTS_HTTP_STATUS }} -eq 200 ]
          then
            echo "::set-output name=exists::true"
          else
            echo "::set-output name=exists::false"
          fi
    outputs:
      exists: ${{ steps.set_output.outputs.exists }}

  build:
    runs-on: [self-hosted, java-11]
    needs: check_docker_image_exists
    if: needs.check_docker_image_exists.outputs.exists != 'true'
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build
        run: mvn clean package -B -e -U
      - name: GitHub Package Registry login
        run: |
          echo ${GITHUB_TOKEN} | docker login -u ${GITHUB_REPOSITORY} --password-stdin docker.pkg.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker build
        run: |
          docker build -t ${IMAGE} .
          docker push ${IMAGE}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - name: Deploy to prod
        if: github.event.inputs.environment == 'p'
        run: |
          echo "CLUSTER=prod-fss" >> $GITHUB_ENV
          echo "NAMESPACE=default" >> $GITHUB_ENV
          echo "URL=melosys-api.nais.adeo.no" >> $GITHUB_ENV
      - name: Deploy to q1
        if: github.event.inputs.environment == 'q1'
        run: |
          echo "CLUSTER=dev-fss" >> $GITHUB_ENV
          echo "NAMESPACE=default" >> $GITHUB_ENV
          echo "URL=melosys-api.dev.adeo.no" >> $GITHUB_ENV
      - name: Deploy to q2
        if: github.event.inputs.environment == 'q2' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        run: |
          echo "CLUSTER=dev-fss" >> $GITHUB_ENV
          echo "NAMESPACE=q2" >> $GITHUB_ENV
          echo "URL=melosys-api-q2.dev.adeo.no" >> $GITHUB_ENV
      - uses: nais/deploy/actions/deploy@v1
        if: ${{ env.CLUSTER != '' }}
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: ${{ env.CLUSTER }}
          RESOURCE: nais.yml
          VAR: IMAGE=${{ env.IMAGE }},NAMESPACE=${{ env.NAMESPACE }},URL=${{ env.URL }}

      - uses: octokit/request-action@v2.x
        if: ${{ env.CLUSTER != '' }}
        id: get_sha
        with:
          route: GET /repos/:repository/git/:ref
          repository: ${{ github.repository }}
          ref: ${{ github.event.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: octokit/request-action@v2.x
        if: ${{ env.CLUSTER != '' }}
        id: get_message
        with:
          route: GET /repos/:repository/git/commits/:ref
          repository: ${{ github.repository }}
          ref: ${{ fromJson(steps.get_sha.outputs.data).object.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Slack Notification
        if: ${{ env.CLUSTER != '' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: "${{ job.status == 'success' && 'good' || 'danger' }}"
          SLACK_USERNAME: Github Actions
          SLACK_ICON: https://github.com/github.png?size=48
          SLACK_TITLE: "melosys-api ${{ job.status == 'success' && 'ble deployet' || 'kunne ikke deployes' }} til ${{ github.event.inputs.environment }}"
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: ${{ fromJson(steps.get_message.outputs.data).message }}
