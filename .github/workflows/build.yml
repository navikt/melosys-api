on:
  pull_request:
    branches:
      - 'master'
      - 'develop'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Miljø'
        required: true
        default: 'q2'

env:
  IMAGE: docker.pkg.github.com/${{ github.repository }}/melosys-api:${{ github.sha }}

jobs:
  build:
    runs-on: [self-hosted, java-11]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build
        run: mvn clean package -B -e -U
      - uses: actions/upload-artifact@v2
        with:
          name: melosys-app
          path: |
            Dockerfile
            nais.yml
            app/target/melosys.jar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.environment != '' }}
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: melosys-app
      - name: GitHub Package Registry login
        run: |
          echo ${GITHUB_TOKEN} | docker login -u ${GITHUB_REPOSITORY} --password-stdin docker.pkg.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker build
        run: |
          docker build -t ${IMAGE} .
          docker push ${IMAGE}
      - name: Deploy to prod
        if: github.event.inputs.environment == 'p'
        run: |
          echo "CLUSTER=prod-fss" >> $GITHUB_ENV
          echo "NAMESPACE=default" >> $GITHUB_ENV
          echo "URL=melosys-api.nais.adeo.no" >> $GITHUB_ENV
      - name: Deploy to q1
        if: github.event.inputs.environment == 'q1'
        run: |
          echo "CLUSTER=dev-fss" >> $GITHUB_ENV
          echo "NAMESPACE=default" >> $GITHUB_ENV
          echo "URL=melosys-api.dev.adeo.no" >> $GITHUB_ENV
      - name: Deploy to q2
        if: github.event.inputs.environment == 'q2'
        run: |
          echo "CLUSTER=dev-fss" >> $GITHUB_ENV
          echo "NAMESPACE=q2" >> $GITHUB_ENV
          echo "URL=melosys-api-q2.dev.adeo.no" >> $GITHUB_ENV
      - uses: nais/deploy/actions/deploy@v1
        if: ${{ env.CLUSTER != '' }}
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: ${{ env.CLUSTER }}
          RESOURCE: nais.yml
          VAR: IMAGE=${{ env.IMAGE }},NAMESPACE=${{ env.NAMESPACE }},URL=${{ env.URL }}

      - uses: octokit/request-action@v2.x
        if: ${{ env.CLUSTER != '' }}
        id: get_sha
        with:
          route: GET /repos/:repository/git/:ref
          repository: ${{ github.repository }}
          ref: ${{ github.event.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: octokit/request-action@v2.x
        if: ${{ env.CLUSTER != '' }}
        id: get_message
        with:
          route: GET /repos/:repository/git/commits/:ref
          repository: ${{ github.repository }}
          ref: ${{ fromJson(steps.get_sha.outputs.data).object.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Slack Notification
        if: ${{ env.CLUSTER != '' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: "${{ job.status == 'success' && 'good' || 'danger' }}"
          SLACK_USERNAME: Github Actions
          SLACK_ICON: https://github.com/github.png?size=48
          SLACK_TITLE: "melosys-api ${{ job.status == 'success' && 'ble deployet' || 'kunne ikke deployes' }} til ${{ github.event.inputs.environment }}"
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: ${{ fromJson(steps.get_message.outputs.data).message }}
