on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'github-actions'
  pull_request:
    branches:
      - 'master'
      - 'develop'

jobs:
  build:
    runs-on: [self-hosted, java-11]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build
        run: mvn clean package -B -e -U
      - uses: actions/upload-artifact@v2
        with:
          name: melosys-app
          path: |
            Dockerfile
            nais.yml
            app/target/melosys.jar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: melosys-app
      - name: Docker build
        run: |
          docker build -t docker.pkg.github.com/${GITHUB_REPOSITORY}/melosys-api:${GITHUB_SHA} .
