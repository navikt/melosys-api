name: Build and Push Image
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., e2e-test-123, feature-x)'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests for faster build'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PASSWORD: ${{ secrets.READER_TOKEN }}
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest-8-cores
    outputs:
      image: ${{ steps.docker-push.outputs.image }}
      custom_tag: ${{ github.event.inputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.READER_TOKEN }}

      - name: Build and test
        run: mvn clean package --threads=8 ${{ github.event.inputs.skip_tests == 'true' && '-DskipTests' || '' }} -B -e -U --settings .github/settings.xml

      - name: Build and publish Docker images (multi-arch)
        id: docker-push
        uses: nais/docker-build-push@v0
        with:
          team: teammelosys
          tag: |
            type=raw,value=${{ github.event.inputs.image_tag }},priority=9001
            type=raw,value=${{ github.sha }},priority=9000
          platforms: linux/amd64,linux/arm64
          salsa: true

      - name: Output image info
        run: |
          echo "✅ Image built and pushed successfully!"
          echo "📦 Image: ${{ steps.docker-push.outputs.image }}"
          echo "🏷️  Custom tag: ${{ github.event.inputs.image_tag }}"
          echo "🏷️  SHA tag: ${{ github.sha }}"
          echo ""
          echo "To use in e2e tests, reference: europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-api:${{ github.event.inputs.image_tag }}"
