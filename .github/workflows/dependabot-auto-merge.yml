name: Dependabot Auto-merge

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions: {}

jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ vars.DEPENDABOT_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_APP_PRIVATE_KEY }}
      - name: Automerge Dependabot PRs
        uses: navikt/automerge-dependabot@0e342d25820ca0d2941dcdcad4b7bbb59ad59122 # v1.5.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          blackout-periods: 'Sat,Sun,Dec 24-Jan 2'
          semver-filter: 'patch,minor'
          merge-method: 'squash'
