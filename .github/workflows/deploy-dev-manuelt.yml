on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Miljø (dev, q1 eller prod)'
        required: true
        default: 'dev'

env:
  IMAGE: docker.pkg.github.com/${{ github.repository }}/melosys-api:${{ github.sha }}
  IMAGE_MANIFEST: https://docker.pkg.github.com/v2/${{ github.repository }}/melosys-api/manifests/${{ github.sha }}

jobs:
  check_docker_image_exists:
    name: Check if docker image exists in registry
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "DOCKER_IMAGE_EXISTS_HTTP_STATUS=$(curl -X GET -s -o /dev/null -w "%{http_code}" ${{ env.IMAGE_MANIFEST }} -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }})" >> $GITHUB_ENV
      - id: set_output
        run: |
          if [ ${{ env.DOCKER_IMAGE_EXISTS_HTTP_STATUS }} -eq 200 ]
          then
            echo "::set-output name=exists::true"
          else
            echo "::set-output name=exists::false"
          fi
    outputs:
      exists: ${{ steps.set_output.outputs.exists }}

  build:
    runs-on: [self-hosted, java-17]
    needs: check_docker_image_exists
    if: needs.check_docker_image_exists.outputs.exists != 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build
        run: |
          JAVA_HOME=/usr/local/openjdk-17
          mvn clean package -B -e -U
      - uses: actions/upload-artifact@v3
        with:
          name: melosys-app
          path: |
            Dockerfile
            nais.yml
            app/target/melosys-sb-execution.jar
            docker-init-scripts/vault-systembruker-env.sh
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: melosys-app
      - name: GitHub Package Registry login
        run: |
          echo ${GITHUB_TOKEN} | docker login -u ${GITHUB_REPOSITORY} --password-stdin docker.pkg.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker build
        run: |
          docker build -t ${IMAGE} .
          docker push ${IMAGE}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: always() && (needs.docker.result == 'success' || needs.docker.result == 'skipped')
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to prod
        if: github.event.inputs.environment == 'prod'
        run: |
          echo "CLUSTER=prod-fss" >> $GITHUB_ENV
          echo "URL=melosys-api.intern.nav.no" >> $GITHUB_ENV
          echo "KAFKA_POOL=nav-prod" >> $GITHUB_ENV
          echo "VAULT_CLUSTER=prod" >> $GITHUB_ENV
          echo "APP_NAME=melosys" >> $GITHUB_ENV
      - name: Deploy to q1
        if: github.event.inputs.environment == 'q1'
        run: |
          echo "CLUSTER=dev-fss" >> $GITHUB_ENV
          echo "URL=melosys-api-q1.dev.intern.nav.no" >> $GITHUB_ENV
          echo "ENVIRONMENT=q1" >> $GITHUB_ENV
          echo "KAFKA_POOL=nav-dev" >> $GITHUB_ENV
          echo "VAULT_CLUSTER=dev" >> $GITHUB_ENV
          echo "APP_NAME=melosys-q1" >> $GITHUB_ENV
      - name: Deploy to dev
        if: github.event.inputs.environment == 'dev'
        run: |
          echo "CLUSTER=dev-fss" >> $GITHUB_ENV
          echo "URL=melosys-api.dev.intern.nav.no" >> $GITHUB_ENV
          echo "KAFKA_POOL=nav-dev" >> $GITHUB_ENV
          echo "VAULT_CLUSTER=dev" >> $GITHUB_ENV
          echo "APP_NAME=melosys" >> $GITHUB_ENV
      - uses: nais/deploy/actions/deploy@v1
        if: ${{ env.CLUSTER != '' }}
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: ${{ env.CLUSTER }}
          RESOURCE: nais.yml
          VAR: IMAGE=${{ env.IMAGE }},URL=${{ env.URL }},KAFKA_POOL=${{ env.KAFKA_POOL }},VAULT_CLUSTER=${{ env.VAULT_CLUSTER }},APP_NAME=${{ env.APP_NAME }}
      - name: Get commit message
        run: echo "COMMIT_MSG=$(git log --format=%s -n 1)" >> $GITHUB_ENV
      - name: Slack Notification
        if: ${{ env.CLUSTER != '' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: "${{ job.status == 'success' && 'good' || 'danger' }}"
          SLACK_USERNAME: Github Actions
          SLACK_ICON: https://github.com/github.png?size=48
          SLACK_TITLE: "melosys-api ${{ job.status == 'success' && 'ble deployet' || 'kunne ikke deployes' }} til ${{ env.ENVIRONMENT }}"
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: ${{ env.COMMIT_MSG }}
