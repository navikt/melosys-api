# https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # TODO: Fjern ignore-regler når Spring Boot oppgraderes til 3.6+
    ignore:
      # Krever Spring Boot 3.6+ (httpcore5-inkompatibilitet)
      - dependency-name: "org.apache.httpcomponents.client5:httpclient5"
        versions: [">=5.6"]
      # Krever Spring Boot 3.6+ (breaking API-endringer)
      - dependency-name: "no.nav.security:*"
        update-types: ["version-update:semver-major"]
      # Krever Spring Boot 3.6+ (NoClassDefFoundError: ApplicationServletEnvironment)
      - dependency-name: "org.springdoc:*"
        update-types: ["version-update:semver-major"]
      # Breaking API-endringer (ExecutionStepInfo nullability)
      - dependency-name: "com.graphql-java:graphql-java"
        update-types: ["version-update:semver-major"]
      # Krever nyere Spring Boot API
      - dependency-name: "com.ninja-squad:springmockk"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
