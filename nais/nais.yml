apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: {{APP_NAME}}
  namespace: teammelosys
  labels:
    team: teammelosys
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 2
    max: 2
    cpuThresholdPercentage: 80
  liveness:
    path: internal/health
    initialDelay: 50
    timeout: 10
    failureThreshold: 5
  readiness:
    path: internal/health
    initialDelay: 45
    timeout: 10
  resources:
    requests:
      memory: "1200Mi"
      cpu: "76m"
    limits:
      memory: "1500Mi"
      # cpu limits are usually not needed
  azure:
    application:
      enabled: true
      tenant: {{TENANT_URL}}
      claims:
        extra:
          - "NAVident"
        groups:
          - id: {{GROUP_MELOSYS_INNLOGGING}}
  accessPolicy:
    inbound:
      rules:
        - application: {{APP_NAME_FRONTEND}}
        - application: {{APP_NAME_TRYGDEAVTALE}}
        - application: {{APP_NAME_MELOSYS_CONSOLE}}
          namespace: teammelosys
          cluster: {{NAIS_CLUSTER_NAME_GCP}}
    outbound:
      external:
        - host: "melosys-unleash-api.nav.cloud.nais.io"
      rules:
        - application: {{APP_NAME_OPPGAVE}}
        - application: {{APP_NAME_PDL}}
        - application: {{APP_NAME_SAF}}
        - application: {{APP_NAME_MEDL}}
        - application: {{APP_NAME_MELOSYS_EESSI}}
        - application: {{APP_NAME_UTBETALING}}
        - application: {{APP_NAME_FAKTURERINGSKOMPONENTEN}}
        - application: {{APP_NAME_INNTEKTSKOMPONENTEN}}
  webproxy: true
  observability:
    logging:
      destinations:
        - id: elastic
        - id: loki
  prometheus:
    enabled: true
    path: /internal/prometheus
  ingresses:
  - "https://{{ URL }}"
  - {{GCP_REACHABLE_INGRESS}}
  envFrom:
    - secret: {{APP_NAME}}
    - secret: {{APP_NAME}}-unleash-api-token
  env:
  - name: SPRING_PROFILES_ACTIVE
    value: nais
  - name: GROUP_MELOSYS_INNLOGGING
    value: {{GROUP_MELOSYS_INNLOGGING}}
  - name: NAIS_CLUSTER_NAME_GCP
    value: {{NAIS_CLUSTER_NAME_GCP}}
  - name: APP_NAME_OPPGAVE
    value: {{APP_NAME_OPPGAVE}}
  - name: APP_NAME_PDL
    value: {{APP_NAME_PDL}}
  - name: APP_NAME_SAF
    value: {{APP_NAME_SAF}}
  - name: APP_NAME_MELOSYS_EESSI
    value: {{APP_NAME_MELOSYS_EESSI}}
  - name: APP_NAME_MEDL
    value: {{APP_NAME_MEDL}}
  - name: APP_NAME_FAKTURERINGSKOMPONENTEN
    value: {{APP_NAME_FAKTURERINGSKOMPONENTEN}}
  - name: APP_NAME_UTBETALING
    value: {{APP_NAME_UTBETALING}}
  - name: APP_NAME_ARBEIDSFORHOLD
    value: {{APP_NAME_ARBEIDSFORHOLD}}
  - name: APP_NAME_INNTEKTSKOMPONENTEN
    value: {{APP_NAME_INNTEKTSKOMPONENTEN}}
  - name: APP_NAME_FELLESKODEVERK
    value: {{APP_NAME_FELLESKODEVERK}}
  - name: APP_NAME
    value: {{APP_NAME}}
  - name: JDK_JAVA_OPTIONS
    value: "$(JAVA_PROXY_OPTIONS)"
  kafka:
    pool: {{ KAFKA_POOL }}
